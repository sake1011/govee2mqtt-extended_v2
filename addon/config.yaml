name: Govee2MQTT Bridge (sake1011 2FA Patch)
image: ghcr.io/sake1011/govee2mqtt-extended-v2-{arch}
version: "2026.04.21-db289bf3"
slug: govee2mqtt
stage: experimental
description: Fork of wez/govee2mqtt with device fixes, crash hardening, and scene cycling. Prefer upstream unless you need these specific changes.
url: https://github.com/sake1011/govee2mqtt-extended_v2
arch:
  - amd64
  - aarch64
init: false
startup: services
services:
  - mqtt:need

apparmor: true

webui: http://[HOST]:[PORT:8056]/assets/index.html
#ingress: true
#ingress_port: 8056

# Host network access is required for LAN discovery
host_network: true

map:
  - type: addon_config
    read_only: false
    path: /app/config

options:
  temperature_scale: "C"

schema:
  temperature_scale: "str?"
  govee_email: "str?"
  govee_password: "password?"
  govee_2fa_code: "password?"
  govee_api_key: "password?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  debug_level: "str?"
  no_multicast: "bool?"
  broadcast_all: "bool?"
  global_broadcast: "bool?"
  scan: "str?"
